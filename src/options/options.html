<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prime JA Subs 設定</title>
    <style>
      body {
        font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
        max-width: 560px;
        margin: 32px auto;
        padding: 0 16px;
        color: #1a1a1a;
      }
      h1 { font-size: 18px; margin-bottom: 4px; }
      .sub { font-size: 12px; color: #666; margin-bottom: 24px; }
      label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: 600; }
      input[type="password"], input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, monospace;
      }
      button {
        margin-top: 12px;
        padding: 8px 16px;
        font-size: 14px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #333; }
      .status { margin-top: 12px; font-size: 13px; color: #0a7a2f; min-height: 18px; }
      .hint { font-size: 12px; color: #666; margin-top: 8px; line-height: 1.5; }
      a { color: #0366d6; }
    </style>
  </head>
  <body>
    <h1>Prime JA Subs</h1>
    <p class="sub">Amazon Prime Video の英語字幕を Claude で日本語に翻訳します。</p>

    <label for="apiKey">Anthropic API キー</label>
    <input id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off" />
    <p class="hint">
      <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer">console.anthropic.com</a>
      で発行したキーを入力してください。
    </p>
    <p class="hint" style="color:#b46800;">
      ⚠ APIキーは <code>chrome.storage.local</code> に<strong>平文で保存</strong>されます。共有端末では使用しないでください。
    </p>

    <button id="save" type="button">保存</button>
    <div class="status" id="status"></div>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
